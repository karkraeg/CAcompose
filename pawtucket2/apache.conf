<VirtualHost *:80>
    ServerName localhost
    ServerAdmin webmaster@localhost

    DocumentRoot /var/www/pawtucket2

    <Directory "/var/www/pawtucket2">
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Security: block access to sensitive files
    <FilesMatch "(setup\.php-dist|composer\.(json|lock)|\.env|\.git)">
        Require all denied
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/pawtucket2-error.log
    CustomLog ${APACHE_LOG_DIR}/pawtucket2-access.log combined
</VirtualHost>
