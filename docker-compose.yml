services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${CA_DB_DATABASE}
      MYSQL_USER:          ${CA_DB_USER}
      MYSQL_PASSWORD:      ${CA_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Providence (backend admin) ───────────────────────────────────────────────
  # Accessible at http://127.0.0.1/backend/
  providence:
    build:
      context: ./providence
      args:
        CA_VERSION: ${CA_PROVIDENCE_VERSION:-master}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CA_DB_HOST:          ${CA_DB_HOST:-db}
      CA_DB_PORT:          ${CA_DB_PORT:-3306}
      CA_DB_USER:          ${CA_DB_USER}
      CA_DB_PASSWORD:      ${CA_DB_PASSWORD}
      CA_DB_DATABASE:      ${CA_DB_DATABASE}
      CA_APP_DISPLAY_NAME: ${CA_APP_DISPLAY_NAME:-My CollectiveAccess}
      CA_ADMIN_EMAIL:      ${CA_ADMIN_EMAIL:-admin@example.com}
      CA_DEFAULT_LOCALE:   ${CA_DEFAULT_LOCALE:-en_US}
      CA_CACHE_BACKEND:    ${CA_CACHE_BACKEND:-redis}
      CA_REDIS_HOST:       ${CA_REDIS_HOST:-redis}
      CA_REDIS_PORT:       ${CA_REDIS_PORT:-6379}
      CA_REDIS_DB:         ${CA_PROVIDENCE_REDIS_DB:-0}
      TZ:                  ${TZ:-UTC}
    volumes:
      # Shared media storage — MEDIA_PATH in .env points to a directory on the
      # host (or an NFS/S3-backed mount). Both providence and pawtucket2 must
      # share the same physical path so uploaded files are visible in both.
      - ${MEDIA_PATH:?MEDIA_PATH must be set in .env}:/var/www/providence/media
      # Override files: place any file here mirroring the app structure.
      # Example: overrides/providence/app/conf/app.conf
      - ./overrides/providence:/overrides/providence:ro

  # ── Pawtucket2 (public frontend) ────────────────────────────────────────────
  # Accessible at http://127.0.0.1/
  pawtucket2:
    build:
      context: ./pawtucket2
      args:
        CA_VERSION: ${CA_PAWTUCKET2_VERSION:-master}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CA_DB_HOST:          ${CA_DB_HOST:-db}
      CA_DB_PORT:          ${CA_DB_PORT:-3306}
      CA_DB_USER:          ${CA_DB_USER}
      CA_DB_PASSWORD:      ${CA_DB_PASSWORD}
      CA_DB_DATABASE:      ${CA_DB_DATABASE}
      CA_APP_DISPLAY_NAME: ${CA_APP_DISPLAY_NAME:-My CollectiveAccess}
      CA_ADMIN_EMAIL:      ${CA_ADMIN_EMAIL:-admin@example.com}
      CA_DEFAULT_LOCALE:   ${CA_DEFAULT_LOCALE:-en_US}
      CA_CACHE_BACKEND:    ${CA_CACHE_BACKEND:-redis}
      CA_REDIS_HOST:       ${CA_REDIS_HOST:-redis}
      CA_REDIS_PORT:       ${CA_REDIS_PORT:-6379}
      CA_REDIS_DB:         ${CA_PAWTUCKET2_REDIS_DB:-1}
      CA_PAWTUCKET2_THEME: ${CA_PAWTUCKET2_THEME:-default}
      TZ:                  ${TZ:-UTC}
    volumes:
      # Same host path as providence — MUST point to the same directory.
      - ${MEDIA_PATH:?MEDIA_PATH must be set in .env}:/var/www/pawtucket2/media
      # Override files: place any file here mirroring the app structure.
      # Examples:
      #   overrides/pawtucket2/app/conf/app.conf
      #   overrides/pawtucket2/themes/mytheme/
      - ./overrides/pawtucket2:/overrides/pawtucket2:ro

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:443:443"   # HTTPS
      - "127.0.0.1:80:80"     # HTTP → redirects to HTTPS
    depends_on:
      - providence
      - pawtucket2
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # generated by generate-dev-certs.sh

volumes:
  db_data:
  redis_data:
