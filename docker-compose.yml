services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${CA_DB_DATABASE}
      MYSQL_USER:          ${CA_DB_USER}
      MYSQL_PASSWORD:      ${CA_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Providence (backend admin) ───────────────────────────────────────────────
  # Accessible at https://127.0.0.1/backend/
  providence:
    build:
      context: ./providence
      args:
        CA_VERSION: ${CA_PROVIDENCE_VERSION:-master}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CA_DB_HOST:          ${CA_DB_HOST:-db}
      CA_DB_PORT:          ${CA_DB_PORT:-3306}
      CA_DB_USER:          ${CA_DB_USER}
      CA_DB_PASSWORD:      ${CA_DB_PASSWORD}
      CA_DB_DATABASE:      ${CA_DB_DATABASE}
      CA_APP_DISPLAY_NAME: ${CA_APP_DISPLAY_NAME:-My CollectiveAccess}
      CA_ADMIN_EMAIL:      ${CA_ADMIN_EMAIL:-admin@example.com}
      CA_DEFAULT_LOCALE:   ${CA_DEFAULT_LOCALE:-en_US}
      CA_CACHE_BACKEND:    ${CA_CACHE_BACKEND:-redis}
      CA_REDIS_HOST:       ${CA_REDIS_HOST:-redis}
      CA_REDIS_PORT:       ${CA_REDIS_PORT:-6379}
      CA_REDIS_DB:         ${CA_PROVIDENCE_REDIS_DB:-0}
      TZ:                  ${TZ:-UTC}
    volumes:
      # ── Persistent runtime data (outside the container) ─────────────────────
      # Application logs (CA-level, not Apache logs)
      - ./data/providence/log:/var/www/providence/app/log
      # Temporary files — CA uses this for sessions, upload staging, file cache
      - ./data/providence/tmp:/var/www/providence/app/tmp
      # Shared media storage — MEDIA_PATH must be the same physical path for
      # both providence and pawtucket2 (NFS, S3-fuse, or a local directory)
      - ${MEDIA_PATH:?MEDIA_PATH must be set in .env}:/var/www/providence/media
      # Batch media import staging area (Providence media importer reads from here)
      # Set IMPORT_PATH in .env — drop files here and they appear in the importer
      - ${IMPORT_PATH:-./import}:/var/www/providence/import
      # ── Override files ───────────────────────────────────────────────────────
      # Place any file here mirroring the app structure to replace it at startup.
      # Example: overrides/providence/app/conf/app.conf
      - ./overrides/providence:/overrides/providence:ro

  # ── Pawtucket2 (public frontend) ────────────────────────────────────────────
  # Accessible at https://127.0.0.1/
  pawtucket2:
    build:
      context: ./pawtucket2
      args:
        CA_VERSION: ${CA_PAWTUCKET2_VERSION:-master}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CA_DB_HOST:          ${CA_DB_HOST:-db}
      CA_DB_PORT:          ${CA_DB_PORT:-3306}
      CA_DB_USER:          ${CA_DB_USER}
      CA_DB_PASSWORD:      ${CA_DB_PASSWORD}
      CA_DB_DATABASE:      ${CA_DB_DATABASE}
      CA_APP_DISPLAY_NAME: ${CA_APP_DISPLAY_NAME:-My CollectiveAccess}
      CA_ADMIN_EMAIL:      ${CA_ADMIN_EMAIL:-admin@example.com}
      CA_DEFAULT_LOCALE:   ${CA_DEFAULT_LOCALE:-en_US}
      CA_CACHE_BACKEND:    ${CA_CACHE_BACKEND:-redis}
      CA_REDIS_HOST:       ${CA_REDIS_HOST:-redis}
      CA_REDIS_PORT:       ${CA_REDIS_PORT:-6379}
      CA_REDIS_DB:         ${CA_PAWTUCKET2_REDIS_DB:-1}
      CA_PAWTUCKET2_THEME: ${CA_PAWTUCKET2_THEME:-default}
      TZ:                  ${TZ:-UTC}
    volumes:
      # ── Persistent runtime data ──────────────────────────────────────────────
      - ./data/pawtucket2/log:/var/www/pawtucket2/app/log
      - ./data/pawtucket2/tmp:/var/www/pawtucket2/app/tmp
      # Same host path as providence — MUST point to the same directory
      - ${MEDIA_PATH:?MEDIA_PATH must be set in .env}:/var/www/pawtucket2/media
      # ── Override files ───────────────────────────────────────────────────────
      # Examples:
      #   overrides/pawtucket2/app/conf/app.conf
      #   overrides/pawtucket2/themes/mytheme/
      - ./overrides/pawtucket2:/overrides/pawtucket2:ro

  # ── Nginx (reverse proxy) ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:443:443"   # HTTPS
      - "127.0.0.1:80:80"     # HTTP → redirects to HTTPS
    depends_on:
      - providence
      - pawtucket2
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # generated by generate-dev-certs.sh

  # ── Analytics — Umami (opt-in) ───────────────────────────────────────────────
  # Self-hosted, privacy-friendly web analytics for Pawtucket2.
  #
  # Start alongside the main stack:
  #   docker compose --profile analytics up -d
  #
  # Access the Umami UI at http://127.0.0.1:3000
  # Default credentials: admin / umami  (change on first login)
  #
  # To add the tracking snippet to Pawtucket2, copy the script tag from the
  # Umami UI (Settings → Websites → Get tracking code) and paste it into your
  # theme's footer template:
  #   overrides/pawtucket2/themes/default/views/pageFormat/pageFooter.tpl
  #
  umami-db:
    image: postgres:16-alpine
    profiles: ["analytics"]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       umami
      POSTGRES_USER:     umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-changeme_umami_db}
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: ["analytics"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-changeme_umami_db}@umami-db:5432/umami
      APP_SECRET:   ${UMAMI_APP_SECRET:-changeme_umami_secret}
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  umami_db_data:
