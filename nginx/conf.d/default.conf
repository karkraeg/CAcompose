# CollectiveAccess — Nginx reverse proxy
#
# Providence (backend admin)  → https://127.0.0.1/backend/
# Pawtucket2 (public catalog) → https://127.0.0.1/
#
# Run ./generate-dev-certs.sh once to create nginx/certs/dev.crt + dev.key
# before starting the stack.

# Use Docker's internal DNS so upstream hostnames are resolved at request
# time, not at nginx startup. This prevents "host not found in upstream"
# errors when nginx starts before all containers are registered in DNS.
resolver 127.0.0.11 valid=5s ipv6=off;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Large media uploads + slow CA installer
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    client_max_body_size  512M;

    # Upstream addresses as variables so nginx resolves them per-request
    # (required when using the resolver directive above)
    set $upstream_providence  http://providence:80;
    set $upstream_pawtucket2  http://pawtucket2:80;

    # ── Providence backend ─────────────────────────────────────────────────────
    location /backend {
        proxy_pass         $upstream_providence;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }

    # ── Pawtucket2 public frontend ─────────────────────────────────────────────
    location / {
        proxy_pass         $upstream_pawtucket2;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
    }
}
