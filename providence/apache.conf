<VirtualHost *:80>
    ServerName localhost
    ServerAdmin webmaster@localhost

    # Default document root (unused, just needed for Apache)
    DocumentRoot /var/www/html

    # Providence is served under /backend/
    # Nginx proxies /backend/... → this container, preserving the full URI.
    # Apache maps /backend → /var/www/providence via Alias.
    Alias /backend /var/www/providence

    <Directory "/var/www/providence">
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Security: block access to sensitive files
    <FilesMatch "(setup\.php-dist|composer\.(json|lock)|\.env|\.git)">
        Require all denied
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/providence-error.log
    CustomLog ${APACHE_LOG_DIR}/providence-access.log combined
</VirtualHost>
